<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>编辑历史尽调报告</title>
  <style>
    :root {
      --blue: #1677ff; --blue-hover: #4096ff;
      --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #f0f0f0;
      --gray-500: #8c8c8c; --gray-700: #434343; --gray-900: #1a1a2e;
      --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #e8edf5 0%, #f0f2f5 120px);
      color: var(--gray-900); min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 700px; margin: 0 auto; padding: 0 16px 40px; }

    .page-header { text-align: center; padding: 32px 16px 20px; }
    .page-header .icon { font-size: 36px; margin-bottom: 8px; }
    .page-header h1 { font-size: 22px; font-weight: 800; }
    .page-header .meta { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 15px 18px; border-bottom: 1px solid var(--gray-200); font-size: 15px; font-weight: 700; }
    .card-body { padding: 16px 18px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 4px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: 8px;
      font-size: 14px; color: var(--gray-900); background: #fff; transition: border-color .2s;
      font-family: inherit; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--blue); box-shadow: 0 0 0 2px rgba(22,119,255,.1);
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group .help-text { font-size: 11px; color: var(--gray-500); margin-top: 3px; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 12px 0; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
      text-align: center;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-hover); }
    .btn-primary:disabled { background: #91caff; cursor: not-allowed; }
    .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
    .btn-secondary:hover { background: var(--gray-200); }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500;
      z-index: 1000; opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .toast.error { background: #fff2f0; color: #cf1322; border: 1px solid #ffa39e; }

    .page-loading { text-align: center; padding: 100px 20px; color: var(--gray-500); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page-error { text-align: center; padding: 80px 20px; }
    .page-error .err-icon { font-size: 52px; margin-bottom: 12px; }
    .page-error .err-msg { font-size: 14px; color: #595959; }
    .page-error .retry-btn { margin-top: 16px; padding: 8px 24px; border-radius: 20px; border: none; background: var(--blue); color: #fff; font-size: 13px; cursor: pointer; }

    .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--blue); text-decoration: none; padding: 8px 0; }
    .footer { text-align: center; padding: 20px 0; font-size: 11px; color: #bfbfbf; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <div class="toast" id="toast"></div>

  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    var id = params.get('report_id');
    var root = document.getElementById('app');
    var toastEl = document.getElementById('toast');
    var toastTimer = null;

    if (!id) {
      root.innerHTML = '<div class="page-error"><div class="err-icon">❌</div><div class="err-msg">缺少报告 ID 参数</div></div>';
      return;
    }

    root.innerHTML = '<div class="page-loading"><div class="spinner"></div><p style="color:#8c8c8c;font-size:13px;">正在加载报告信息...</p></div>';

    fetch('/api/dd-reports/' + encodeURIComponent(id), { credentials: 'include' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(renderEditForm)
      .catch(function(e) {
        root.innerHTML = '<div class="page-error"><div class="err-icon">⚠️</div><div class="err-msg">报告加载失败：' + e.message
          + '</div><button class="retry-btn" onclick="location.reload()">重新加载</button></div>';
      });

    function showToast(msg, type) {
      toastEl.textContent = msg;
      toastEl.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toastEl.className = 'toast ' + type; }, 2500);
    }

    function renderEditForm() {
      var data = arguments[0];
      var dd = data.due_diligence || {};

      var html = ''

        /* ====== Header ====== */
        + '<div class="page-header">'
        + '<div class="icon">✏️</div>'
        + '<h1>编辑尽调报告</h1>'
        + '<div class="meta">' + (data.company_name || '') + '　|　' + (data.report_id || '') + '</div>'
        + '</div>'

        /* ====== 企业基本信息 ====== */
        + '<div class="card">'
        + '<div class="card-header"><span class="card-icon">🏢</span>编辑尽调信息</div>'
        + '<div class="card-body">'
        + '<div class="form-group"><label>开户目的</label>'
        + '<input type="text" id="f-opening_purpose" value="' + esc(dd.opening_purpose || '') + '" placeholder="请输入开户目的" /></div>'
        + '<div class="form-group"><label>资金来源</label>'
        + '<input type="text" id="f-fund_source" value="' + esc(dd.fund_source || '') + '" placeholder="如：经营收入" /></div>'
        + '<div class="form-group"><label>预期交易规模</label>'
        + '<input type="text" id="f-expected_volume" value="' + esc(dd.expected_volume || '') + '" placeholder="如：年交易规模5000万-1亿" /></div>'
        + '<div class="form-group"><label>跨境业务</label>'
        + '<select id="f-cross_border"><option value="否"' + (dd.cross_border === '否' ? ' selected' : '') + '>否</option>'
        + '<option value="是"' + (dd.cross_border === '是' ? ' selected' : '') + '>是</option></select></div>'
        + '<div class="form-group"><label>风险评级</label>'
        + '<select id="f-risk_rating"><option value="低风险"' + (dd.risk_rating === '低风险' ? ' selected' : '') + '>低风险</option>'
        + '<option value="中等风险"' + (dd.risk_rating === '中等风险' ? ' selected' : '') + '>中等风险</option>'
        + '<option value="高风险"' + (dd.risk_rating === '高风险' ? ' selected' : '') + '>高风险</option></select></div>'
        + '<div class="form-group"><label>尽调结论</label>'
        + '<textarea id="f-conclusion" placeholder="请输入尽调结论">' + esc(dd.conclusion || '') + '</textarea></div>'
        + '</div></div>'

        /* ====== Action Buttons ====== */
        + '<div class="btn-row">'
        + '<button class="btn btn-secondary" onclick="history.back()">取消</button>'
        + '<button class="btn btn-primary" id="saveBtn" onclick="saveReport(\'' + data.report_id + '\')">保存修改</button>'
        + '</div>'

        /* ====== Footer ====== */
        + '<div class="footer">'
        + '<a class="back-link" href="javascript:history.back()">← 返回</a>'
        + '</div>';

      root.innerHTML = html;
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    window.saveReport = function(reportId) {
      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      var payload = {
        due_diligence: {
          opening_purpose: document.getElementById('f-opening_purpose').value.trim(),
          fund_source: document.getElementById('f-fund_source').value.trim(),
          expected_volume: document.getElementById('f-expected_volume').value.trim(),
          cross_border: document.getElementById('f-cross_border').value,
          risk_rating: document.getElementById('f-risk_rating').value,
          conclusion: document.getElementById('f-conclusion').value.trim()
        }
      };

      fetch('/api/dd-reports/' + encodeURIComponent(reportId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        credentials: 'include'
      })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(res) {
        showToast('✅ ' + (res.message || '保存成功'), 'success');
        setTimeout(function() { history.back(); }, 1000);
      })
      .catch(function(e) {
        showToast('❌ 保存失败：' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = '保存修改';
      });
    };
  })();
  </script>
</body>
</html>
