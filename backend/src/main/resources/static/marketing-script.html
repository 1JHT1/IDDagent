<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>营销话术 - 客户触达</title>
  <style>
    :root { --blue: #1677ff; --green: #52c41a; --orange: #fa8c16; --gray-50: #fafafa; --gray-200: #f0f0f0;
      --gray-500: #8c8c8c; --gray-700: #434343; --gray-900: #1a1a2e; --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #fff7e6 0%, #fffbe6 180px); color: var(--gray-900);
      min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 16px 40px; }
    .header { text-align: center; padding: 32px 16px 20px; }
    .header .icon { font-size: 40px; margin-bottom: 6px; }
    .header h1 { font-size: 22px; font-weight: 800; }
    .header .meta { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 10px; }
    .card-header .c-icon { font-size: 20px; }
    .card-header .c-title { font-size: 15px; font-weight: 700; }
    .card-body { padding: 16px 18px; }

    /* Approach banner */
    .approach-banner { background: linear-gradient(135deg, #e6f7ff, #f0f5ff); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 14px; border-left: 3px solid var(--blue); }
    .approach-text { font-size: 13px; color: var(--gray-700); line-height: 1.7; }

    /* Script items */
    .script-item { display: flex; gap: 10px; margin-bottom: 14px; }
    .script-item:last-child { margin-bottom: 0; }
    .script-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #ff9c6e, #ff7a45);
      color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .script-text { font-size: 13px; color: var(--gray-700); line-height: 1.7; padding-top: 2px; }

    /* Value props */
    .value-prop { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 8px;
      background: #f6ffed; border-radius: 10px; border: 1px solid #d9f7be; }
    .value-prop:last-child { margin-bottom: 0; }
    .vp-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--green);
      color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .vp-text { font-size: 13px; font-weight: 500; color: #262626; }

    .loading { text-align: center; padding: 100px 20px; color: var(--gray-500); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--orange);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 80px 20px; }
    .retry-btn { margin-top: 14px; padding: 8px 24px; border-radius: 20px; border: none; background: var(--blue);
      color: #fff; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body><div class="container" id="app"></div>
<script>
(function () {
  var code = new URLSearchParams(location.search).get('code');
  var root = document.getElementById('app');
  if (!code) { root.innerHTML = '<div class="error"><p>缺少企业信用代码参数</p></div>'; return; }
  root.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:#8c8c8c;font-size:13px;">正在加载营销话术...</p></div>';

  fetch('/api/outreach/' + encodeURIComponent(code))
    .then(function(r) { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data) {
      var scripts = (data && data.scripts) || {};
      var points = scripts.talking_points || [];
      var props = scripts.value_props || [];
      var now = new Date();
      var timeStr = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());

      var html = '<div class="header"><div class="icon">💬</div><h1>营销话术 · 客户触达</h1>'
        + '<div class="meta">生成时间：' + timeStr + '</div></div>';

      // Approach
      if (scripts.approach) {
        html += '<div class="card"><div class="card-header"><span class="c-icon">🎯</span><span class="c-title">切入策略</span></div>'
          + '<div class="card-body"><div class="approach-banner"><div class="approach-text">' + scripts.approach + '</div></div></div></div>';
      }

      // Talking points
      if (points.length > 0) {
        html += '<div class="card"><div class="card-header"><span class="c-icon">🗣️</span><span class="c-title">沟通话术</span></div>'
          + '<div class="card-body">';
        points.forEach(function(p, i) {
          html += '<div class="script-item"><span class="script-num">' + (i+1) + '</span>'
            + '<span class="script-text">' + p + '</span></div>';
        });
        html += '</div></div>';
      }

      // Value propositions
      if (props.length > 0) {
        html += '<div class="card"><div class="card-header"><span class="c-icon">⭐</span><span class="c-title">核心产品卖点</span></div>'
          + '<div class="card-body">';
        props.forEach(function(p) {
          html += '<div class="value-prop"><span class="vp-icon">✓</span><span class="vp-text">' + p + '</span></div>';
        });
        html += '</div></div>';
      }

      html += '<div style="text-align:center;color:#bfbfbf;font-size:11px;padding:24px 0;">以上话术仅供参考，请结合实际情况灵活调整</div>';
      root.innerHTML = html;
    })
    .catch(function(e) {
      root.innerHTML = '<div class="error"><p style="font-size:48px;">⚠️</p><p style="font-size:14px;color:#595959;">加载失败：'+e.message+'</p><button class="retry-btn" onclick="location.reload()">重新加载</button></div>';
    });

  function pad(n) { return n<10?'0'+n:''+n; }
})();
</script>
</body>
</html>
