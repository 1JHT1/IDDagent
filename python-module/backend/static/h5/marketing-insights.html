<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>营销谈资 - 客户洞察</title>
  <style>
    :root { --blue: #1677ff; --gray-50: #fafafa; --gray-200: #f0f0f0; --gray-500: #8c8c8c; --gray-700: #434343;
      --gray-900: #1a1a2e; --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, #f5f3ff 180px); color: var(--gray-900);
      min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 16px 40px; }
    .header { text-align: center; padding: 32px 16px 20px; }
    .header .icon { font-size: 40px; margin-bottom: 6px; }
    .header h1 { font-size: 22px; font-weight: 800; }
    .header .meta { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 10px; }
    .card-header .c-icon { font-size: 20px; }
    .card-header .c-title { font-size: 15px; font-weight: 700; }
    .card-body { padding: 16px 18px; }
    .card-body .text { font-size: 13px; line-height: 1.8; color: var(--gray-700); }

    /* Timeline */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 2px; background: var(--gray-200); }
    .timeline-item { position: relative; margin-bottom: 16px; }
    .timeline-item:last-child { margin-bottom: 0; }
    .timeline-dot { position: absolute; left: -17px; top: 4px; width: 10px; height: 10px; border-radius: 50%;
      background: var(--blue); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--blue); }
    .timeline-date { font-size: 11px; color: var(--gray-500); margin-bottom: 2px; }
    .timeline-title { font-size: 13px; font-weight: 600; color: #262626; line-height: 1.5; }
    .timeline-source { font-size: 11px; color: #bfbfbf; margin-top: 2px; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500;
      background: #eef2ff; color: #4f46e5; }
    .company-info { display: flex; gap: 12px; flex-wrap: wrap; }
    .info-item { flex: 1; min-width: 120px; }
    .info-label { font-size: 11px; color: var(--gray-500); }
    .info-value { font-size: 13px; font-weight: 600; color: #262626; }

    .loading { text-align: center; padding: 100px 20px; color: var(--gray-500); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 80px 20px; }
    .retry-btn { margin-top: 14px; padding: 8px 24px; border-radius: 20px; border: none; background: var(--blue);
      color: #fff; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body><div class="container" id="app"></div>
<script>
(function () {
  var code = new URLSearchParams(location.search).get('code');
  var root = document.getElementById('app');
  if (!code) { root.innerHTML = '<div class="error"><p>缺少企业信用代码参数</p></div>'; return; }
  root.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:#8c8c8c;font-size:13px;">正在加载营销谈资...</p></div>';

  fetch('/api/outreach/' + encodeURIComponent(code))
    .then(function(r) { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data) {
      var insights = (data && data.insights) || {};
      var news = insights.recent_news || [];
      var now = new Date();
      var timeStr = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());

      var html = '<div class="header"><div class="icon">📊</div><h1>营销谈资 · 客户洞察</h1>'
        + '<div class="meta">生成时间：' + timeStr + '</div></div>';

      // Company info
      html += '<div class="card"><div class="card-header"><span class="c-icon">🏢</span><span class="c-title">企业概览</span></div>'
        + '<div class="card-body"><div class="text">' + (insights.company_profile || data.company_name || '') + '</div></div></div>';

      // Industry analysis
      if (insights.industry_analysis) {
        html += '<div class="card"><div class="card-header"><span class="c-icon">📈</span><span class="c-title">行业分析</span></div>'
          + '<div class="card-body"><div class="text">' + insights.industry_analysis + '</div></div></div>';
      }

      // Recent news
      if (news.length > 0) {
        html += '<div class="card"><div class="card-header"><span class="c-icon">📰</span><span class="c-title">近期动态</span></div>'
          + '<div class="card-body"><div class="timeline">';
        news.forEach(function(n) {
          html += '<div class="timeline-item"><div class="timeline-dot"></div>'
            + '<div class="timeline-date">' + n.date + '</div>'
            + '<div class="timeline-title">' + n.title + '</div>'
            + '<div class="timeline-source">来源：' + n.source + '</div></div>';
        });
        html += '</div></div></div>';
      }

      html += '<div style="text-align:center;color:#bfbfbf;font-size:11px;padding:24px 0;">以上信息仅供内部营销参考，数据来源于公开渠道</div>';
      root.innerHTML = html;
    })
    .catch(function(e) {
      root.innerHTML = '<div class="error"><p style="font-size:48px;">⚠️</p><p style="font-size:14px;color:#595959;">加载失败：'+e.message+'</p><button class="retry-btn" onclick="location.reload()">重新加载</button></div>';
    });

  function pad(n) { return n<10?'0'+n:''+n; }
})();
</script>
</body>
</html>
